<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Naina ❤️</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;1,500&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --rose-gradient: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
            --heart-red: #ff4d6d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: pointer; }

        body {
            min-height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--rose-gradient);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
            100% { background-position: 0% 50% }
        }

        /* Responsive Glass Card */
        .glass-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            padding: 2.5rem;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            text-align: center;
            color: white;
            user-select: none;
            transition: transform 0.3s ease;
        }

        /* Font Styles */
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3.5rem, 15vw, 5.5rem);
            margin-bottom: 0.5rem;
            text-shadow: 2px 4px 8px rgba(0,0,0,0.1);
        }

        .content-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1rem, 4vw, 1.3rem);
            font-style: italic;
            line-height: 1.6;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        /* New "Interactive Footer" instead of a glitchy button */
        .tap-to-enter {
            font-family: 'Quicksand', sans-serif;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .pulse-icon {
            font-size: 1.5rem;
            animation: pulseHeart 1.5s infinite;
        }

        @keyframes pulseHeart {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Floating Background Emojis */
        .emoji {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .glass-card { padding: 2rem 1.5rem; }
            h1 { margin-bottom: 0; }
        }
    </style>
</head>
<body onclick="startSurprise()">

    <div class="glass-card" id="card">
        <h1>Hi Naina ❤️</h1>
        <p class="content-text">
            Your lobster 🦞 has built a little world <br> 
            filled with surprises, just for you...
        </p>
        
        <div class="tap-to-enter">
            <span class="pulse-icon">✨</span>
            <span>Tap anywhere to go forward</span>
        </div>
    </div>

    <script>
        // 1. Smooth Entrance
        gsap.from("#card", {
            duration: 2,
            y: 30,
            opacity: 0,
            ease: "power4.out"
        });

        // 2. Parallax Effect (Card moves slightly with mouse/touch)
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 40;
            const y = (window.innerHeight / 2 - e.pageY) / 40;
            gsap.to("#card", { rotationY: x, rotationX: -y, duration: 0.7 });
        });

        // 3. The "Next Page" Logic
        let isTransitioning = false;
        function startSurprise() {
            if (isTransitioning) return;
            isTransitioning = true;

            // Immediate Celebration
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff4d6d', '#ffffff', '#ff9a9e']
            });

            // Zoom into the card "world"
            gsap.to("#card", {
                duration: 1,
                scale: 3,
                opacity: 0,
                filter: "blur(20px)",
                ease: "power2.inOut",
                onComplete: () => {
                    window.location.href = "love-question.html";
                }
            });
        }

        // 4. Background Ambience
        function spawnEmoji() {
            const emojis = ['❤️', '✨', '🌸', '💖'];
            const el = document.createElement("div");
            el.className = "emoji";
            el.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = Math.random() * 100 + "vw";
            el.style.top = "110vh";
            el.style.fontSize = Math.random() * 20 + 20 + "px";
            document.body.appendChild(el);

            gsap.to(el, {
                y: "-120vh",
                x: `random(-100, 100)`,
                rotation: `random(0, 360)`,
                duration: Math.random() * 5 + 5,
                ease: "none",
                onComplete: () => el.remove()
            });
        }
        setInterval(spawnEmoji, 700);
    </script>
</body>
</html>
